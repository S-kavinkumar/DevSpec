# Spring App Config
spring.application.name=devspec-backend
server.port=8080

# Database Config (MySQL default)
spring.datasource.url=jdbc:mysql://127.0.0.1:3306/devspec?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate Config
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Flyway Database Migrations
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=1
spring.flyway.enabled=true

# File Upload Settings
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

# Temporary workspace path
devspec.upload.dir=c:/Users/kavin/OneDrive/Desktop/DevSpec/temp-uploads
# Portable Maven path
devspec.maven.home=c:/Users/kavin/OneDrive/Desktop/DevSpec/maven-bin/apache-maven-3.9.6

# JWT Authentication Config
devspec.jwt.secret=9a67471b7fcd89df43b2f8a4b63914a2754687d853e6601b63e9f4c3a2fcf883
devspec.jwt.expiration=86400000

# AI Configuration
# Options: gemini, groq
ai.provider=gemini
groq.api.key=${GROQ_API_KEY}
gemini.api.key=${GEMINI_API_KEY}

# Enable H2 database in-memory console if needed
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
# To run in H2 mode, pass -Dspring.profiles.active=h2 on runtime

# Scoring Engine Weightages (Percentage)
devspec.weight.architecture=20
devspec.weight.codeQuality=20
devspec.weight.security=15
devspec.weight.maintainability=15
devspec.weight.testing=15
devspec.weight.documentation=10
devspec.weight.performance=5

# Enterprise Configs: Thread Pool, Queues & Timeouts
devspec.threadpool.core-size=4
devspec.threadpool.max-size=8
devspec.threadpool.queue-capacity=20
devspec.analysis.timeout-minutes=30
devspec.max-upload-bytes=52428800



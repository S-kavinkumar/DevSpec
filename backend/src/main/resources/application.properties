# ==========================================================
# Spring Boot
# ==========================================================
spring.application.name=devspec-backend
server.port=${PORT:8080}

# ==========================================================
# MySQL (Railway)
# ==========================================================
spring.datasource.url=jdbc:mysql://${MYSQLHOST}:${MYSQLPORT}/${MYSQLDATABASE}?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=${MYSQLUSER}
spring.datasource.password=${MYSQLPASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ==========================================================
# JPA
# ==========================================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ==========================================================
# Flyway
# ==========================================================
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=1

# ==========================================================
# File Upload
# ==========================================================
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

# Railway/Render writable directory
devspec.upload.dir=/tmp/devspec

# ==========================================================
# Maven
# ==========================================================
devspec.maven.home=${MAVEN_HOME:}

# ==========================================================
# JWT
# ==========================================================
devspec.jwt.secret=${JWT_SECRET}
devspec.jwt.expiration=86400000

# ==========================================================
# AI
# ==========================================================
ai.provider=${AI_PROVIDER:gemini}

groq.api.key=${GROQ_API_KEY}
gemini.api.key=${GEMINI_API_KEY}

# ==========================================================
# H2
# ==========================================================
spring.h2.console.enabled=false

# ==========================================================
# Scoring
# ==========================================================
devspec.weight.architecture=20
devspec.weight.codeQuality=20
devspec.weight.security=15
devspec.weight.maintainability=15
devspec.weight.testing=15
devspec.weight.documentation=10
devspec.weight.performance=5

# ==========================================================
# Thread Pool
# ==========================================================
devspec.threadpool.core-size=4
devspec.threadpool.max-size=8
devspec.threadpool.queue-capacity=20
devspec.analysis.timeout-minutes=30
devspec.max-upload-bytes=52428800